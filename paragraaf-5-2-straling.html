// Enkelvoudige nuclide-weergave als SVG-blokje (correct: A boven Z links van symbool)
function NuclideBlok({n, size=80, showLabels=true}){
  const r=size*0.38, cx=size/2, cy=size/2;
  const symSize=size*0.22, tagSize=size*0.13;
  // A staat linksboven, Z linksonder van het symbool
  const symX=cx+size*0.06, aX=cx-size*0.12, aY=cy-size*0.08, zX=cx-size*0.12, zY=cy+size*0.14;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:"block"}}>
      <circle cx={cx} cy={cy} r={r} fill={n.kleur+"33"} stroke={n.kleur} strokeWidth={size*0.025}/>
      {showLabels&&<>
        <text x={aX} y={aY} fill="#fbbf24" fontSize={tagSize} textAnchor="middle" fontWeight="700" dominantBaseline="middle">{n.A}</text>
        <text x={zX} y={zY} fill="#60a5fa" fontSize={tagSize} textAnchor="middle" dominantBaseline="middle">{n.Z}</text>
      </>}
      <text x={symX} y={cy+size*0.03} fill="#f1f5f9" fontSize={symSize} textAnchor="middle" fontWeight="800" dominantBaseline="middle">{n.sym}</text>
    </svg>
  );
}

// Meerdere nucliden naast elkaar, klikbaar
function NuclideSVG({onSelect, selected, nuclides}){
  const lijst = nuclides || ALL_NUCLIDES;
  return(
    <div style={{margin:"12px 0"}}>
      <div style={{fontSize:10,color:"#64748b",textAlign:"center",marginBottom:6,letterSpacing:1}}>KLIK OP EEN ISOTOOP OM DE KERNSAMENSTELLING TE ZIEN</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
        {lijst.map((n,i)=>{
          const isSel=selected===i;
          return(
            <div key={i} onClick={()=>onSelect(isSel?null:i)} style={{cursor:"pointer",opacity:selected!==null&&!isSel?0.4:1,transition:"opacity .2s",textAlign:"center"}}>
              <div style={{border:`2px solid ${isSel?n.kleur:"transparent"}`,borderRadius:12,padding:3,background:isSel?n.kleur+"15":"transparent"}}>
                <NuclideBlok n={n} size={72}/>
              </div>
              <div style={{fontSize:9,color:n.stabiel?"#34d399":"#ef4444",fontWeight:600,marginTop:2}}>{n.stabiel?"stabiel":"radioactief"}</div>
              <div style={{fontSize:9,color:"#64748b"}}>{n.naam}</div>
            </div>
          );
        })}
      </div>
      {selected!==null&&(()=>{
        const n=lijst[selected];
        return(
          <div style={{background:n.kleur+"1a",border:`1.5px solid ${n.kleur}55`,borderRadius:12,padding:"14px 16px",marginTop:10,animation:"popIn .25s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <NuclideBlok n={n} size={80}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:15,color:"#f1f5f9",marginBottom:8}}>{n.naam}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
                  <div style={{background:"rgba(251,191,36,.12)",borderRadius:8,padding:"8px 6px",textAlign:"center",border:"1px solid rgba(251,191,36,.25)"}}>
                    <div style={{fontSize:20,fontWeight:900,color:"#fbbf24"}}>{n.A}</div>
                    <div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>massagetal</div>
                  </div>
                  <div style={{background:"rgba(96,165,250,.12)",borderRadius:8,padding:"8px 6px",textAlign:"center",border:"1px solid rgba(96,165,250,.25)"}}>
                    <div style={{fontSize:20,fontWeight:900,color:"#60a5fa"}}>{n.Z}</div>
                    <div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>protonen</div>
                  </div>
                  <div style={{background:"rgba(148,163,184,.12)",borderRadius:8,padding:"8px 6px",textAlign:"center",border:"1px solid rgba(148,163,184,.25)"}}>
                    <div style={{fontSize:20,fontWeight:900,color:"#94a3b8"}}>{n.N}</div>

              </div>
            </div>
          </div>

// ── Vervalvergelijking SVG ─────────────────────────────────────────────────
// NuclideBox: A linksboven, Z linksonder, symbool rechts — zoals in het boek
// Elke box is 52px breed, 60px hoog, gecentreerd op (cx, cy)
function NuclideBoxSVG({n, cx, cy, kleur}){
  const bw=52, bh=52;
  const x0=cx-bw/2, y0=cy-bh/2;
  // Symbool rechts-gecentreerd, A linksboven, Z linksonder
  const symX=cx+4, symY=cy+2;
  const tagX=cx-14;
  return(
    <g>
      <rect x={x0} y={y0} width={bw} height={bh} rx={7}
        fill={(kleur||n.kleur)+"22"} stroke={kleur||n.kleur} strokeWidth={1.5}/>
      {/* A — massagetal — linksboven */}
      <text x={tagX} y={cy-8} fill="#fbbf24" fontSize="9" textAnchor="middle" fontWeight="700" dominantBaseline="middle">{n.A}</text>
      {/* Z — atoomnummer — linksonder */}
      <text x={tagX} y={cy+10} fill="#60a5fa" fontSize="9" textAnchor="middle" dominantBaseline="middle">{n.Z}</text>
      {/* Symbool */}
      <text x={symX} y={symY} fill="#f1f5f9" fontSize="15" textAnchor="middle" fontWeight="800" dominantBaseline="middle">{n.sym}</text>
    </g>
  );
}

const DECAY_EXAMPLES = {

    moeder: {sym:"C",  A:14,  Z:6,   naam:"Koolstof-14",   kleur:"#a855f7"},
    dochter:{sym:"N",  A:14,  Z:7,   naam:"Stikstof-14",   kleur:"#22c55e"},
    deeltje:{sym:"e",  A:0,   Z:-1,  naam:"elektron",      kleur:"#06b6d4"},

    type:"β-verval",

    uitleg:"Bij β-verval stijgt het aantal protonen met 1. Het massagetal blijft gelijk.",
  },
};

function DecaySVG({type}){
  if(!type) return(
    <div style={{textAlign:"center",padding:"16px 0",color:"#475569",fontSize:12}}>Selecteer een vervaltype hieronder om de vergelijking te zien.</div>
  );
  const d=DECAY_EXAMPLES[type];
  // Layout: moeder → dochter + deeltje [+ γ]
  // Posities (cx) voor elk element, voldoende ruimte voor tweeLetterige symbolen
  const W=340, H=110, midY=48;
  const positions=[55, 140, 230, 295]; // moeder, dochter, deeltje, gamma
  return(
    <div style={{background:"rgba(0,0,0,.3)",borderRadius:12,padding:"12px 8px",border:"1px solid rgba(255,255,255,.08)",margin:"12px 0"}}>
      <div style={{fontSize:10,color:"#64748b",textAlign:"center",marginBottom:8,letterSpacing:1,fontWeight:700}}>{d.type.toUpperCase()} — VERVALVERGELIJKING</div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",minWidth:280}}>
        {/* Legenda kleuren */}
        <text x={positions[0]} y={H-6} fill="#94a3b8" fontSize="7" textAnchor="middle">{d.moeder.naam}</text>
        <text x={positions[1]} y={H-6} fill="#94a3b8" fontSize="7" textAnchor="middle">{d.dochter.naam}</text>
        <text x={positions[2]} y={H-6} fill="#94a3b8" fontSize="7" textAnchor="middle">{d.deeltje.naam}</text>

        <NuclideBoxSVG n={d.moeder}  cx={positions[0]} cy={midY}/>
        {/* Pijl */}
        <text x={98} y={midY+4} fill="#94a3b8" fontSize="16" textAnchor="middle" fontWeight="700">→</text>
        <NuclideBoxSVG n={d.dochter} cx={positions[1]} cy={midY}/>
        {/* Plus */}
        <text x={186} y={midY+4} fill="#94a3b8" fontSize="14" textAnchor="middle">+</text>
        <NuclideBoxSVG n={d.deeltje} cx={positions[2]} cy={midY}/>
        {d.gamma&&<>
          <text x={267} y={midY+4} fill="#94a3b8" fontSize="14" textAnchor="middle">+</text>
          {/* Gamma als correct blokje: A=0, Z=0, γ */}
          <rect x={positions[3]-20} y={midY-22} width={44} height={44} rx={7}
            fill="rgba(251,191,36,.15)" stroke="#fbbf24" strokeWidth={1.5}/>
          <text x={positions[3]-10} y={midY-8} fill="#fbbf24" fontSize="9" textAnchor="middle" fontWeight="700">0</text>
          <text x={positions[3]-10} y={midY+10} fill="#60a5fa" fontSize="9" textAnchor="middle">0</text>
          <text x={positions[3]+4}  y={midY+2}  fill="#fbbf24" fontSize="15" textAnchor="middle" fontWeight="800">γ</text>
          <text x={positions[3]} y={H-6} fill="#94a3b8" fontSize="7" textAnchor="middle">gammafoton</text>
        </>}
      </svg>
      <div style={{fontSize:11,color:"#fbbf24",textAlign:"center",marginTop:4,marginBottom:4,fontFamily:"'Courier New',monospace",lineHeight:1.6}}>{d.regel}</div>
      <div style={{fontSize:12,color:"#cbd5e1",textAlign:"center"}}>{d.uitleg}</div>
    </div>
  );
}

  {type:"text",
   question:"Koolstofdatering werkt doordat ¹⁴C in levende organismen constant aangevuld wordt. Na de dood stopt de aanvulling en vervalt ¹⁴C. T½ = 5730 jaar. Een fossiel heeft nog 25% ¹⁴C over. Hoe oud is het?",
   options:["2865 jaar","5730 jaar","11460 jaar","17190 jaar"],
   answer:2,

  {type:"text",
   question:"Van alle kernen met Z > 83 zijn geen stabiele isotopen bekend. Welke uitspraak volgt hieruit logisch?",

  {type:"text",
   question:"Na één halveringstijd is de helft van een radioactieve stof vervallen. Na twee halveringstijden is dan…",

  {type:"text",
   question:"Polonium-211 heeft een halveringstijd van 0,52 seconden. Uranium-238 heeft een halveringstijd van 4,5 miljard jaar. Welke conclusie kun je trekken?",
   options:[
     "Polonium is gevaarlijker dan uranium omdat het sneller vervalt",
     "Uranium vervalt niet, want de halveringstijd is zo lang",
     "Een korte halveringstijd betekent dat de kern snel vervalt — maar zegt op zichzelf niets over gevaarlijkheid",
     "Polonium-211 is stabiel"
   ],
   answer:2,
   explanation:"Een korte T½ betekent dat de kern snel vervalt (hoge activiteit), maar gevaarlijkheid hangt ook af van het soort straling, de hoeveelheid stof en de blootstellingsroute. Uranium met lange T½ heeft juist een lage activiteit per kern. Polonium-211 is wél gevaarlijk, maar niet puur omdat het snel vervalt."},
];

// ── Zelfcheck ──────────────────────────────────────────────────────────────
const SELFCHECK=[
  {stelling:"Bij α-verval daalt het atoomnummer Z met 2.", juist:true},
  {stelling:"Bij β-verval verandert het massagetal A.",    juist:false},
  {stelling:"Isotopen hebben hetzelfde Z maar een ander A.", juist:true},
];
function SelfCheck({onDone}){
  const [antw,setAntw]=useState([null,null,null]);
  const [checked,setChecked]=useState(false);
  const score=antw.filter((a,i)=>a===SELFCHECK[i].juist).length;
  return(
    <div style={{background:"rgba(251,191,36,.06)",border:"1px solid rgba(251,191,36,.2)",borderRadius:14,padding:16,marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:14,color:"#fbbf24",marginBottom:12}}>🧠 Zelfcheck — snap je dit al?</div>
      {SELFCHECK.map((s,i)=>(
        <div key={i} style={{marginBottom:10}}>
          <div style={{fontSize:13,color:"#e2e8f0",marginBottom:6}}>{i+1}. {s.stelling}</div>
          <div style={{display:"flex",gap:8}}>
            {["Juist","Onjuist"].map(opt=>{
              const val=opt==="Juist";
              const isChosen=antw[i]===val;
              const isCorrect=checked&&val===s.juist;
              const isWrong=checked&&isChosen&&!isCorrect;
              return(
                <button key={opt} onClick={()=>{if(!checked){const n=[...antw];n[i]=val;setAntw(n);}}}
                  style={{padding:"6px 16px",borderRadius:8,border:`1.5px solid ${isCorrect?"#34d399":isWrong?"#ef4444":isChosen?"#fbbf24":"rgba(255,255,255,.15)"}`,
                    background:isCorrect?"rgba(52,211,153,.15)":isWrong?"rgba(239,68,68,.15)":isChosen?"rgba(251,191,36,.15)":"rgba(255,255,255,.04)",
                    color:isCorrect?"#34d399":isWrong?"#ef4444":isChosen?"#fbbf24":"#94a3b8",
                    cursor:checked?"default":"pointer",fontSize:13,fontWeight:600}}>
                  {opt}
                </button>
              );
            })}
          </div>
        </div>
      ))}
      {!checked?(
        <button onClick={()=>setChecked(true)} disabled={antw.includes(null)}
          style={{marginTop:8,padding:"8px 20px",background:antw.includes(null)?"rgba(255,255,255,.05)":"rgba(251,191,36,.2)",border:`1px solid ${antw.includes(null)?"rgba(255,255,255,.1)":"#fbbf24"}`,borderRadius:8,color:antw.includes(null)?"#475569":"#fbbf24",fontWeight:700,cursor:antw.includes(null)?"default":"pointer",fontSize:13}}>
          Controleer
        </button>
      ):(
        <div style={{marginTop:10}}>
          <div style={{color:score===3?"#34d399":score>=2?"#fbbf24":"#f87171",fontWeight:700,fontSize:14}}>
            {score===3?"✅ Alles goed!":score===2?"⚠️ Bijna — check de uitleg hierboven":"❌ Herhaal level 1 en 2 nog eens"}
          </div>
          <button onClick={onDone} style={{marginTop:8,padding:"7px 16px",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:8,color:"#e2e8f0",cursor:"pointer",fontSize:13}}>
            Verder →
          </button>
        </div>
      )}
    </div>
  );
}

// ── Vraagkaart ─────────────────────────────────────────────────────────────
function QuestionCard({q,sel,done,onSelect,shake,lvl}){
  const [nuclideSel,setNuclideSel]=useState(null);
  const [decayType,setDecayType]=useState(null);
  const kleur=lvl.kleur;

  return(
    <div style={{background:"rgba(255,255,255,.04)",borderRadius:16,padding:16,border:`1px solid ${kleur}30`,marginBottom:12,animation:shake?"shake .6s ease":"none"}}>
      {q.preQuestion&&!done&&(
        <div style={{background:"rgba(251,191,36,.07)",border:"1px solid rgba(251,191,36,.2)",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
          <div style={{fontSize:11,color:"#fbbf24",fontWeight:700,marginBottom:4}}>💭 DENKPAUZE</div>
          <div style={{fontSize:13,color:"#cbd5e1"}}>{q.preQuestion}</div>
        </div>
      )}
      <div style={{fontSize:14,fontWeight:600,lineHeight:1.6,marginBottom:12}}>{q.question}</div>

      {/* Meerdere nucliden klikbaar */}
      {q.type==="nuclide_quiz"&&(
        <NuclideSVG selected={nuclideSel} onSelect={setNuclideSel} nuclides={q.nuclides||ALL_NUCLIDES}/>
      )}

      {/* Enkelvoudig atoom tonen (niet klikbaar, puur visueel) */}
      {q.type==="nuclide_single"&&(
        <div style={{display:"flex",justifyContent:"center",margin:"10px 0 14px"}}>
          <div style={{textAlign:"center"}}>
            <NuclideBlok n={q.nuclide} size={96}/>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:6}}>{q.nuclide.naam}</div>
            <div style={{fontSize:10,color:"#64748b",marginTop:2}}>massagetal linksboven · protonen linksonder</div>
          </div>
        </div>
      )}

      {q.type==="decay_quiz"&&(
        <>
          <DecaySVG type={done?q.decayType:decayType}/>
          {!done&&(
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
              {Object.entries(DECAY_EXAMPLES).map(([k,v])=>(
                <button key={k} onClick={()=>setDecayType(decayType===k?null:k)}
                  style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${decayType===k?v.moeder.kleur:"rgba(255,255,255,.15)"}`,background:decayType===k?v.moeder.kleur+"22":"rgba(255,255,255,.04)",color:decayType===k?v.moeder.kleur:"#94a3b8",fontSize:12,cursor:"pointer"}}>
                  {k==="alpha"?"α-verval":"β-verval"}
                </button>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function App(){
  const [screen,setScreen]  = useState("home");
  const [lvlIdx,setLvlIdx]  = useState(0);
  const [qIdx,setQIdx]       = useState(0);
  const [sel,setSel]         = useState(null);
  const [done,setDone]       = useState(false);
  const [scores,setScores]   = useState([0,0,0,0]);
  const [pts,setPts]         = useState(0);
  const [streak,setStreak]   = useState(0);
  const [maxStr,setMaxStr]   = useState(0);
  const [stars,setStars]     = useState([0,0,0,0]);
  const [shake,setShake]     = useState(false);
  const [showSelfCheck,setShowSelfCheck] = useState(false);
  const [selfCheckDone,setSelfCheckDone] = useState(false);
  const [shuffledQuestions,setShuffledQuestions] = useState([]);
  const [avatar,setAvatar]   = useState(DEFAULT_AVATAR);
  const [owned,setOwned]     = useState(DEFAULT_OWNED);
  const [shopCat,setShopCat] = useState("body");
  const [buyFlash,setBuyFlash]= useState(null);

  useEffect(()=>{
    const raw0=LEVELS[0].questions;
    setShuffledQuestions(raw0.map(q=>{
      if(!q.options||q.answer===undefined) return q;
      const correct=q.options[q.answer];
      const s=[...q.options];
      for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}
      return {...q,options:s,answer:s.indexOf(correct)};
    }));
  },[]);

  useEffect(()=>{
    try{
      const raw=localStorage.getItem(SAVE_KEY);
      if(raw){
        const d=JSON.parse(raw);
        if(d.avatar) setAvatar({...DEFAULT_AVATAR,...d.avatar});
        if(d.owned)  setOwned(d.owned);
        if(d.pts!==undefined) setPts(d.pts);
        if(d.stars_52) setStars(d.stars_52);
      }
    }catch(e){}
  },[]);

  const persist=(av,ow,p,st)=>{
    try{
      const prev=JSON.parse(localStorage.getItem(SAVE_KEY))||{};
      localStorage.setItem(SAVE_KEY,JSON.stringify({...prev,avatar:av,owned:ow,pts:p,...(st?{stars_52:st}:{})}));
    }catch(e){}
  };

  const addPts=n=>setPts(p=>{const np=p+n;persist(avatar,owned,np);return np;});

  const buyItem=item=>{
    if(owned.includes(item.id)||pts<item.price) return;
    const no=[...owned,item.id],np=pts-item.price;
    setOwned(no);setPts(np);setBuyFlash(item.id);setTimeout(()=>setBuyFlash(null),1200);persist(avatar,no,np);
  };
  const equipItem=(cat,item)=>{
    if(!owned.includes(item.id)) return;
    const na={...avatar,[cat]:item.id};setAvatar(na);persist(na,owned,pts);
  };

  const lvl=LEVELS[lvlIdx];
  const qs=shuffledQuestions.length>0?shuffledQuestions:lvl?.questions;
  const q=qs?.[qIdx];
  const total=qs?.length;
  const correct=done&&sel===q?.answer;
  const goHome=()=>{setScreen("home");setSel(null);setDone(false);setShowSelfCheck(false);};

  const handleConfirm=()=>{
    if(sel===null) return;
    setDone(true);
    if(sel===q.answer){
      const ns=streak+1;setStreak(ns);setMaxStr(s=>Math.max(s,ns));
      addPts(10+(ns>2?5:0));
      setScores(s=>{const n=[...s];n[lvlIdx]++;return n;});
    } else {setStreak(0);setShake(true);setTimeout(()=>setShake(false),600);}
  };

  const handleNext=()=>{
    setSel(null);setDone(false);
    if(qIdx+1<total){
      setQIdx(i=>i+1);
    } else {
      const pct=scores[lvlIdx]/total;
      const ns=pct>=.85?3:pct>=.6?2:pct>=.33?1:0;
      setStars(s=>{const n=[...s];n[lvlIdx]=ns;persist(avatar,owned,pts,n);return n;});
      if(lvlIdx===1&&!selfCheckDone){
        setShowSelfCheck(true);
      } else {
        setScreen("result");
      }
    }
  };

  const shuffleOptions=(qs)=>qs.map(q=>{
    if(!q.options||q.answer===undefined) return q;
    const correct=q.options[q.answer];
    const shuffled=[...q.options];
    for(let i=shuffled.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
    }
    return {...q,options:shuffled,answer:shuffled.indexOf(correct)};
  });

  const startLevel=i=>{
    setLvlIdx(i);setQIdx(0);setSel(null);setDone(false);setShowSelfCheck(false);
    setScores(s=>{const n=[...s];n[i]=0;return n;});
    setShuffledQuestions(shuffleOptions(LEVELS[i].questions));
    setScreen("question");
  };

  const totalStars=stars.reduce((a,b)=>a+b,0),maxStars=stars.length*3;

  return(
    <div style={{minHeight:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",color:"#f1f5f9",paddingBottom:40}}>
      <style>{`
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
        @keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
        .ch:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5)!important;transition:all .2s}
        .ob:hover{border-color:#fbbf24!important;background:rgba(251,191,36,.08)!important}
        button{font-family:inherit}
        .layout{display:flex;min-height:calc(100vh - 49px)}
        .sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;padding:20px 16px;border-right:1px solid rgba(255,255,255,.07);height:calc(100vh - 49px);position:sticky;top:49px;overflow-y:auto}
        .main{flex:1;min-width:0;padding:24px 40px;max-width:820px}
        .lgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        @media(max-width:700px){.sidebar{display:none!important}.main{padding:16px 14px}}
        @media(max-width:480px){.lgrid{grid-template-columns:1fr}}
      `}</style>

      {/* HEADER */}
      <div style={{background:"rgba(255,255,255,.03)",borderBottom:"1px solid rgba(255,255,255,.07)",padding:"9px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:10,backdropFilter:"blur(8px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⚛️</span>
          <div><div style={{fontWeight:800,fontSize:14}}>Atomen en verval</div><div style={{fontSize:10,color:"#64748b"}}>4 HAVO · §5.2 · Noordhoff</div></div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12}}>
          <a href="index.html" style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:12,textDecoration:"none"}}>☢️ H5</a>
          {screen!=="home"&&<button onClick={goHome} style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:12}}>← Levels</button>}
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,color:"#fbbf24"}}>{pts}</div>
            <div style={{fontSize:10,color:"#64748b"}}>punten</div>

          <span dangerouslySetInnerHTML={{__html:renderAvatarHTML(avatar,36)}}/>

            <button onClick={()=>setScreen("shop")} style={{background:"none",border:"none",cursor:"pointer",display:"block",margin:"0 auto 8px"}}>
              <AvatarDisplay avatar={avatar} size={72}/>
            </button>
            <div style={{fontWeight:700,fontSize:12,marginBottom:1}}>Jouw avatar</div>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:10}}>klik om aan te passen</div>

                    <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{l.title}</div>
                    <div style={{fontSize:12,color:"rgba(255,255,255,.65)",lineHeight:1.4}}>{l.description}</div>
                    <div style={{marginTop:8,display:"flex",gap:2}}>{[1,2,3].map(s=><span key={s} style={{fontSize:13,opacity:stars[i]>=s?1:.2}}>⭐</span>)}</div>
                    <div style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.3)",borderRadius:6,padding:"2px 7px",fontSize:10,color:l.kleur}}>{l.questions.length} vr.</div>
                  </div>
                ))}
              </div>

              <button onClick={()=>setScreen("theorie")} className="ch"
                style={{width:"100%",marginBottom:14,padding:"14px 18px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:14,color:"#e2e8f0",fontWeight:600,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                <span style={{fontSize:26}}>📖</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>Theorie overzicht</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>Lees de samenvatting vóór of ná het oefenen</div>
                </div>
                <span style={{marginLeft:"auto",color:"#64748b",fontSize:18}}>›</span>
              </button>

              <div style={{background:"rgba(255,255,255,.03)",borderRadius:12,padding:14,border:"1px solid rgba(255,255,255,.06)"}}>
                <div style={{fontSize:11,color:"#64748b",marginBottom:10,fontWeight:700,letterSpacing:.5}}>📚 NA DIT ARRANGEMENT KUN JE…</div>
                {[
                  "✓ A, Z en N berekenen bij een gegeven isotoop",
                  "✓ Isotopen van elkaar onderscheiden en vergelijken",
                  "✓ α- en β-verval uitleggen in termen van kernveranderingen",
                  "✓ Vervalvergelijkingen opstellen en controleren op behoudswetten",
                  "✓ Halveringstijd toepassen in berekeningssituaties"
                ].map((d,i)=>(
                  <div key={i} style={{fontSize:13,color:"#cbd5e1",padding:"4px 0",borderBottom:i<4?"1px solid rgba(255,255,255,.04)":"none"}}>{d}</div>
                ))}
              </div>
            </div>
          )}

          {/* ZELFCHECK */}
          {screen==="question"&&showSelfCheck&&(
            <div style={{animation:"fadeIn .3s ease"}}>
              <SelfCheck onDone={()=>{setSelfCheckDone(true);setShowSelfCheck(false);setScreen("result");}}/>
            </div>
          )}

          {/* VRAAG */}
          {screen==="question"&&!showSelfCheck&&q&&(
            <div style={{animation:"fadeIn .3s ease"}}>
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12,color:"#64748b"}}>
                  <span>{lvl.icon} {lvl.title}</span><span>Vraag {qIdx+1} / {total}</span>
                </div>
                <div style={{height:5,background:"rgba(255,255,255,.06)",borderRadius:999}}>
                  <div style={{height:"100%",borderRadius:999,background:`linear-gradient(90deg,${lvl.kleur},${LEVELS[(lvlIdx+1)%4].kleur})`,width:`${((qIdx+(done?1:0))/total)*100}%`,transition:"width .5s"}}/>
                </div>
              </div>

              <div style={{background:`${lvl.kleur}15`,border:`1px solid ${lvl.kleur}30`,borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#94a3b8"}}>
                <span style={{color:lvl.kleur,fontWeight:700}}>Leerdoel:</span> {
                  lvlIdx===0?"A, Z en N lezen en berekenen bij isotopen":
                  lvlIdx===1?"α- en β-verval herkennen en effect op A en Z uitleggen":
                  lvlIdx===2?"Vervalvergelijkingen opstellen en controleren":
                  "Redeneren over kernverval, transmutatie en halveringstijd"
                }
              </div>

              <QuestionCard q={q} sel={sel} done={done} onSelect={setSel} shake={shake} lvl={lvl}/>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                {q.options.map((opt,i)=>{
                  let bg="rgba(255,255,255,.04)",border="rgba(255,255,255,.1)",col="#e2e8f0";
                  if(sel===i&&!done){bg="rgba(251,191,36,.12)";border="#fbbf24";}
                  if(done){
                    if(i===q.answer){bg="rgba(52,211,153,.12)";border="#34d399";col="#34d399";}
                    else if(i===sel&&i!==q.answer){bg="rgba(239,68,68,.12)";border="#ef4444";col="#ef4444";}
                  }
                  return(
                    <button key={i} className={!done?"ob":""} onClick={()=>{if(!done)setSel(i);}}
                      style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:"14px 16px",color:col,fontSize:13,fontWeight:500,cursor:done?"default":"pointer",textAlign:"left",display:"flex",alignItems:"flex-start",gap:10,width:"100%",minHeight:60}}>
                      <span style={{minWidth:24,height:24,borderRadius:7,background:"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,marginTop:1}}>
                        {done?(i===q.answer?"✓":i===sel?"✗":String.fromCharCode(65+i)):String.fromCharCode(65+i)}
                      </span>{opt}
                    </button>
                  );
                })}
              </div>

              {done&&(
                <div style={{background:correct?"rgba(52,211,153,.08)":"rgba(239,68,68,.08)",border:`1px solid ${correct?"#34d399":"#ef4444"}40`,borderRadius:12,padding:14,marginBottom:12,animation:"popIn .3s ease"}}>
                  <div style={{fontSize:13,fontWeight:700,color:correct?"#34d399":"#f87171",marginBottom:4}}>
                    {correct?"✅ Goed gedaan!":"❌ Niet helemaal..."}
                    {correct&&streak>2&&<span style={{marginLeft:8,color:"#fbbf24"}}>🔥 {streak}x streak! +5</span>}
                  </div>
                  <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.65}}>💡 {q.explanation}</div>
                </div>
              )}

              {!done?(
                <button onClick={handleConfirm} disabled={sel===null}
                  style={{width:"100%",padding:14,background:sel!==null?`linear-gradient(135deg,${lvl.kleur},${LEVELS[(lvlIdx+1)%4].kleur})`:"rgba(255,255,255,.05)",border:"none",borderRadius:12,color:sel!==null?"#0a0f1e":"#475569",fontWeight:700,fontSize:15,cursor:sel!==null?"pointer":"default"}}>
                  Controleer →
                </button>
              ):(
                <button onClick={handleNext}
                  style={{width:"100%",padding:14,background:`linear-gradient(135deg,${lvl.kleur},${LEVELS[(lvlIdx+1)%4].kleur})`,border:"none",borderRadius:12,color:"#0a0f1e",fontWeight:700,fontSize:15,cursor:"pointer"}}>
                  {qIdx+1<total?"Volgende vraag →":lvlIdx===1&&!selfCheckDone?"Zelfcheck →":"Resultaat bekijken 🏆"}
                </button>
              )}
            </div>
          )}

          {/* RESULTAAT */}
          {screen==="result"&&(
            <div style={{animation:"fadeIn .4s ease",textAlign:"center"}}>
              <div style={{fontSize:68,marginBottom:10,lineHeight:1}}>{stars[lvlIdx]===3?"🏆":stars[lvlIdx]>=2?"🎉":stars[lvlIdx]===1?"💪":"😤"}</div>
              <h2 style={{fontSize:24,fontWeight:800,margin:"0 0 6px"}}>{lvl.title} — Klaar!</h2>
              <div style={{fontSize:14,color:"#94a3b8",marginBottom:18}}>{scores[lvlIdx]} van {total} goed beantwoord</div>
              <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:18}}>
                {[1,2,3].map(s=><span key={s} style={{fontSize:50,opacity:stars[lvlIdx]>=s?1:.2,animation:stars[lvlIdx]>=s?`popIn .4s ease ${s*.15}s both`:"none"}}>⭐</span>)}
              </div>
              <div style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:14,marginBottom:12,border:"1px solid rgba(255,255,255,.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:13,color:"#94a3b8"}}>Score</span>
                  <span style={{fontSize:13,fontWeight:700,color:lvl.kleur}}>{Math.round((scores[lvlIdx]/total)*100)}%</span>
                </div>
                <div style={{height:7,background:"rgba(255,255,255,.06)",borderRadius:999}}>
                  <div style={{height:"100%",borderRadius:999,background:`linear-gradient(90deg,${lvl.kleur},${LEVELS[(lvlIdx+1)%4].kleur})`,width:`${(scores[lvlIdx]/total)*100}%`,transition:"width 1s"}}/>
                </div>
              </div>
              <div style={{background:"rgba(251,191,36,.06)",borderRadius:12,padding:10,marginBottom:12,border:"1px solid rgba(251,191,36,.15)"}}>
                <div style={{fontSize:13,color:"#fbbf24"}}>🔥 Langste streak: {maxStr}x &nbsp;|&nbsp; 🎯 Totaal: {pts} punten</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <button onClick={()=>startLevel(lvlIdx)} style={{padding:13,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,color:"#e2e8f0",fontWeight:600,cursor:"pointer",fontSize:14}}>🔄 Opnieuw</button>
                <button onClick={goHome} style={{padding:13,background:`linear-gradient(135deg,${lvl.kleur},${LEVELS[(lvlIdx+1)%4].kleur})`,border:"none",borderRadius:12,color:"#0a0f1e",fontWeight:700,cursor:"pointer",fontSize:14}}>🏠 Levels</button>
              </div>
              {lvlIdx<LEVELS.length-1&&(
                <button onClick={()=>startLevel(lvlIdx+1)} style={{width:"100%",padding:13,background:LEVELS[lvlIdx+1].bg,border:`1px solid ${LEVELS[lvlIdx+1].kleur}40`,borderRadius:12,color:"#f1f5f9",fontWeight:600,cursor:"pointer",fontSize:14}}>
                  Volgend level: {LEVELS[lvlIdx+1].icon} {LEVELS[lvlIdx+1].title} →
                </button>
              )}
            </div>
          )}

          {/* THEORIE */}
          {screen==="theorie"&&(
            <div style={{animation:"fadeIn .4s ease"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:24}}>
                <button onClick={goHome} style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:12}}>← Terug</button>
                <h2 style={{fontSize:20,fontWeight:800,margin:0}}>📖 Theorie — §5.2 Atomen en verval</h2>
              </div>

              {/* Blok 1: Bouw van het atoom */}
              <div style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.3)",borderRadius:16,padding:20,marginBottom:18}}>
                <div style={{fontWeight:800,fontSize:17,color:"#818cf8",marginBottom:14}}>⚛️ Bouw van het atoom</div>
                <p style={{fontSize:14,color:"#cbd5e1",lineHeight:1.8,marginBottom:16}}>
                  Atomen bestaan uit een <strong style={{color:"#f1f5f9"}}>kern</strong> met protonen en neutronen, en een <strong style={{color:"#f1f5f9"}}>elektronenwolk</strong> eromheen. Het aantal protonen bepaalt welk element het is.
                </p>

                {/* A/Z/N uitleg kaarten */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
                  {[
                    {sym:"A",naam:"Massagetal",kleur:"#fbbf24",def:"Totaal aantal kerndeeltjes",formule:"A = N + Z"},
                    {sym:"Z",naam:"Protonen",kleur:"#60a5fa",def:"Aantal protonen in de kern",formule:"Bepaalt het element"},
                    {sym:"N",naam:"Neutronen",kleur:"#94a3b8",def:"Aantal neutronen in de kern",formule:"N = A − Z"},
                  ].map((d,i)=>(
                    <div key={i} style={{background:d.kleur+"18",border:`1.5px solid ${d.kleur}50`,borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
                      <div style={{fontSize:32,fontWeight:900,color:d.kleur,marginBottom:6,fontFamily:"serif",lineHeight:1}}>{d.sym}</div>
                      <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:6}}>{d.naam}</div>
                      <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.5,marginBottom:6}}>{d.def}</div>
                      <div style={{fontSize:11,color:d.kleur,fontWeight:700,fontFamily:"monospace",background:"rgba(0,0,0,.2)",borderRadius:6,padding:"3px 6px"}}>{d.formule}</div>
                    </div>
                  ))}
                </div>

                {/* Notatie uitleg met isotopen van waterstof */}
                <div style={{background:"rgba(0,0,0,.2)",borderRadius:12,padding:16,marginBottom:12,border:"1px solid rgba(255,255,255,.07)"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:12,letterSpacing:.5}}>NOTATIE — DRIE ISOTOPEN VAN WATERSTOF</div>
                  <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap",marginBottom:12}}>
                    {ALL_NUCLIDES.slice(0,3).map((n,i)=>(
                      <div key={i} style={{textAlign:"center"}}>
                        <NuclideBlok n={n} size={80}/>
                        <div style={{fontSize:12,fontWeight:700,color:n.kleur,marginTop:6}}>{n.naam}</div>
                        <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>
                          {n.A} kerndeeltjes · {n.Z} proton{n.N>0?` · ${n.N} neutron${n.N>1?"en":""}`:""}
                        </div>
                        <div style={{fontSize:10,color:n.stabiel?"#34d399":"#ef4444",marginTop:2,fontWeight:600}}>{n.stabiel?"stabiel":"radioactief"}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:12,color:"#93c5fd",background:"rgba(96,165,250,.08)",borderRadius:8,padding:"8px 12px",border:"1px solid rgba(96,165,250,.2)"}}>
                    📌 <strong>Isotopen</strong> = kernen van hetzelfde element (zelfde protonen) met een ander massagetal — dus ander aantal neutronen. Chemisch identiek, in massa verschillend.
                  </div>
                </div>

                {/* Koolstof isotopen */}
                <div style={{background:"rgba(0,0,0,.2)",borderRadius:12,padding:16,border:"1px solid rgba(255,255,255,.07)"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:12,letterSpacing:.5}}>VOORBEELD — KOOLSTOFISOTOPEN</div>
                  <div style={{display:"flex",gap:20,justifyContent:"center",flexWrap:"wrap",marginBottom:8}}>
                    {[ALL_NUCLIDES[3], ALL_NUCLIDES[4]].map((n,i)=>(
                      <div key={i} style={{textAlign:"center"}}>
                        <NuclideBlok n={n} size={80}/>
                        <div style={{fontSize:12,fontWeight:700,color:n.kleur,marginTop:6}}>{n.naam}</div>
                        <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{n.Z} protonen · {n.N} neutronen</div>
                        <div style={{fontSize:10,color:n.stabiel?"#34d399":"#ef4444",marginTop:2,fontWeight:600}}>{n.stabiel?"stabiel":"radioactief"}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:12,color:"#94a3b8",textAlign:"center"}}>Beide hebben 6 protonen → beide koolstof. Maar C-14 heeft 2 extra neutronen en is radioactief.</div>
                </div>
              </div>

              {/* Blok 2: Radioactief verval */}
              <div style={{background:"rgba(249,115,22,.08)",border:"1px solid rgba(249,115,22,.3)",borderRadius:16,padding:20,marginBottom:18}}>
                <div style={{fontWeight:800,fontSize:17,color:"#fb923c",marginBottom:14}}>💥 Radioactief verval</div>
                <p style={{fontSize:14,color:"#cbd5e1",lineHeight:1.8,marginBottom:16}}>
                  Instabiele kernen zijn <strong style={{color:"#f1f5f9"}}>radioactief</strong>: ze veranderen spontaan in een ander element. De oorspronkelijke kern heet <em style={{color:"#fbbf24"}}>moederkern</em>, de nieuwe kern <em style={{color:"#34d399"}}>dochterkern</em>.
                </p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
                  {[
                    {type:"α-verval",kleur:"#f97316",uitgestoten:"heliumkern (2 protonen + 2 neutronen)",effect:"Protonen: −2  |  Massagetal: −4",symbool:"⁴₂He of α",voorbeeld:"uranium-238 → thorium-234 + α"},
                    {type:"β-verval",kleur:"#a855f7",uitgestoten:"elektron (uit een neutron dat splitst)",effect:"Protonen: +1  |  Massagetal: onveranderd",symbool:"⁰₋₁e of β",voorbeeld:"koolstof-14 → stikstof-14 + β"},
                  ].map((d,i)=>(
                    <div key={i} style={{background:d.kleur+"15",border:`1.5px solid ${d.kleur}45`,borderRadius:12,padding:14}}>
                      <div style={{fontSize:15,fontWeight:800,color:d.kleur,marginBottom:10}}>{d.type}</div>
                      <div style={{fontSize:12,color:"#94a3b8",marginBottom:4,fontWeight:600}}>Uitgestoten deeltje:</div>
                      <div style={{fontSize:13,color:"#e2e8f0",marginBottom:10,lineHeight:1.5}}>{d.uitgestoten}</div>
                      <div style={{fontSize:12,color:"#94a3b8",marginBottom:4,fontWeight:600}}>Effect op de kern:</div>
                      <div style={{fontSize:13,color:d.kleur,fontWeight:700,marginBottom:10,fontFamily:"monospace"}}>{d.effect}</div>
                      <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Notatie: <span style={{color:d.kleur,fontWeight:700,fontFamily:"monospace"}}>{d.symbool}</span></div>
                      <div style={{fontSize:11,color:"#64748b",borderTop:"1px solid rgba(255,255,255,.06)",paddingTop:8,marginTop:4}}>{d.voorbeeld}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"rgba(251,191,36,.08)",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#fcd34d",border:"1px solid rgba(251,191,36,.2)"}}>
                  ⚡ Bij beide vervaltypen kan ook een <strong>γ-foton</strong> vrijkomen (massagetal 0, lading 0). Het verandert de kernsamenstelling niet.
                </div>
              </div>

              {/* Blok 3: Vervalvergelijkingen */}
              <div style={{background:"rgba(34,197,94,.08)",border:"1px solid rgba(34,197,94,.3)",borderRadius:16,padding:20,marginBottom:18}}>
                <div style={{fontWeight:800,fontSize:17,color:"#4ade80",marginBottom:14}}>🧮 Vervalvergelijkingen opstellen</div>
                <p style={{fontSize:14,color:"#cbd5e1",lineHeight:1.8,marginBottom:14}}>
                  Twee behoudswetten gelden altijd in een vervalvergelijking:
                </p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                  <div style={{background:"rgba(251,191,36,.1)",borderRadius:10,padding:"14px",border:"1px solid rgba(251,191,36,.3)"}}>
                    <div style={{fontWeight:700,color:"#fbbf24",marginBottom:6,fontSize:14}}>🔢 Massagetallen</div>
                    <div style={{fontSize:13,color:"#e2e8f0",lineHeight:1.6}}>Som van de massagetallen links = som rechts</div>
                  </div>
                  <div style={{background:"rgba(96,165,250,.1)",borderRadius:10,padding:"14px",border:"1px solid rgba(96,165,250,.3)"}}>
                    <div style={{fontWeight:700,color:"#60a5fa",marginBottom:6,fontSize:14}}>⚡ Protonen</div>
                    <div style={{fontSize:13,color:"#e2e8f0",lineHeight:1.6}}>Som van de protonen links = som rechts</div>
                  </div>
                </div>

                {/* α-verval voorbeeld met SVG */}
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#4ade80",marginBottom:8,letterSpacing:.5}}>VOORBEELD — α-VERVAL</div>
                  <DecaySVG type="alpha"/>
                </div>

                {/* β-verval voorbeeld */}
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:"#4ade80",marginBottom:8,letterSpacing:.5}}>VOORBEELD — β-VERVAL</div>
                  <DecaySVG type="beta"/>
                </div>
              </div>

              {/* Blok 4: Notatieafspraken */}
              <div style={{background:"rgba(168,85,247,.08)",border:"1px solid rgba(168,85,247,.3)",borderRadius:16,padding:20,marginBottom:18}}>
                <div style={{fontWeight:800,fontSize:17,color:"#c084fc",marginBottom:14}}>📝 Notatieafspraken kerndeeltjes</div>
                <p style={{fontSize:13,color:"#94a3b8",marginBottom:14,lineHeight:1.6}}>In vervalvergelijkingen schrijf je alle deeltjes op dezelfde manier: massagetal linksboven, protonen linksonder, symbool rechts.</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[
                    {A:1,  Z:1,  sym:"H",  omschr:"Waterstofkern / proton",   kleur:"#60a5fa", alt:"of ¹₁p"},
                    {A:4,  Z:2,  sym:"He", omschr:"Heliumkern / α-deeltje",   kleur:"#f97316", alt:"of α"},
                    {A:0,  Z:-1, sym:"e",  omschr:"Elektron / β-deeltje",     kleur:"#a855f7", alt:"of β"},
                    {A:0,  Z:0,  sym:"γ",  omschr:"Gammafoton",               kleur:"#fbbf24", alt:""},
                    {A:1,  Z:0,  sym:"n",  omschr:"Neutron",                  kleur:"#94a3b8", alt:""},
                  ].map((d,i)=>{
                    const n={sym:d.sym,A:d.A,Z:d.Z,N:0,kleur:d.kleur,naam:"",stabiel:true,desc:""};
                    return(
                      <div key={i} style={{background:d.kleur+"12",borderRadius:10,padding:"12px 14px",border:`1px solid ${d.kleur}30`,display:"flex",alignItems:"center",gap:12}}>
                        <NuclideBlok n={n} size={52} showLabels={true}/>
                        <div>
                          <div style={{fontSize:13,color:"#f1f5f9",fontWeight:600,marginBottom:2}}>{d.omschr}</div>
                          {d.alt&&<div style={{fontSize:11,color:d.kleur,fontFamily:"monospace"}}>{d.alt}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <button onClick={goHome} style={{width:"100%",padding:14,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,color:"#e2e8f0",fontWeight:600,cursor:"pointer",fontSize:14}}>
                ← Terug naar levels
              </button>
            </div>
          )}

          {/* WINKEL */}
          {screen==="shop"&&(
            <div style={{animation:"fadeIn .35s ease"}}>
              <div style={{textAlign:"center",marginBottom:18}}>
                <div style={{display:"flex",justifyContent:"center",marginBottom:8}}><AvatarDisplay avatar={avatar} size={88}/></div>
                <div style={{fontSize:17,fontWeight:800}}>Jouw Avatar</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>💰 {pts} punten beschikbaar</div>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
                {Object.entries(CAT_LABELS).map(([cat,label])=>(
                  <button key={cat} onClick={()=>setShopCat(cat)}
                    style={{flexShrink:0,padding:"6px 12px",borderRadius:20,border:`1.5px solid ${shopCat===cat?"#60a5fa":"rgba(255,255,255,.1)"}`,background:shopCat===cat?"rgba(96,165,250,.15)":"rgba(255,255,255,.04)",color:shopCat===cat?"#60a5fa":"#94a3b8",fontWeight:600,fontSize:12,cursor:"pointer"}}>
                    {label}
                  </button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}}>
                {SHOP[shopCat].map(item=>{
                  const isOwned=owned.includes(item.id),isEq=avatar[shopCat]===item.id,canAff=pts>=item.price,jB=buyFlash===item.id;
                  return(
                    <div key={item.id} onClick={()=>isOwned?equipItem(shopCat,item):buyItem(item)} className="ch"
                      style={{background:isEq?"rgba(96,165,250,.15)":jB?"rgba(52,211,153,.15)":"rgba(255,255,255,.04)",
                        border:`1.5px solid ${isEq?"#60a5fa":jB?"#34d399":isOwned?"rgba(255,255,255,.18)":"rgba(255,255,255,.08)"}`,
                        borderRadius:12,padding:"12px 10px",cursor:(!isOwned&&!canAff)?"not-allowed":"pointer",
                        opacity:(!isOwned&&!canAff)?.45:1,textAlign:"center",position:"relative"}}>
                      {shopCat==="appbg"
                        ?<div style={{width:80,height:26,borderRadius:6,background:item.css||item.color||"#111",margin:"0 auto 6px",border:"1px solid rgba(255,255,255,.15)"}}/>
                        :shopCat==="bg"
                          ?<div style={{width:36,height:36,borderRadius:"50%",background:item.color,margin:"0 auto 6px",border:"2px solid rgba(255,255,255,.15)"}}/>
                          :<div style={{fontSize:30,marginBottom:5,lineHeight:1}}>{item.emoji||" "}</div>
                      }
                      <div style={{fontWeight:600,fontSize:12,color:"#f1f5f9"}}>{item.name}</div>
                      <div style={{marginTop:4,fontSize:11}}>
                        {isEq?<span style={{color:"#60a5fa",fontWeight:700}}>✓ Aan</span>
                        :isOwned?<span style={{color:"#34d399"}}>In bezit</span>
                        :jB?<span style={{color:"#34d399",fontWeight:700}}>✓ Gekocht!</span>
                        :<span style={{color:canAff?"#fbbf24":"#ef4444",fontWeight:600}}>💰 {item.price} pts</span>}
                      </div>
                      {isEq&&<div style={{position:"absolute",top:7,right:7,width:9,height:9,borderRadius:"50%",background:"#60a5fa"}}/>}
                    </div>
                  );
                })}
              </div>
              <button onClick={goHome} style={{width:"100%",padding:12,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,color:"#e2e8f0",fontWeight:600,cursor:"pointer",fontSize:13}}>
                ← Terug naar levels
              </button>
            </div>
          )}

        </div>{/* end main */}
      </div>{/* end layout */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
