<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>§5.2 Atomen en verval · 4 HAVO</title>
  <script src="straling-shop-data.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(160deg,#0a0f1e,#111827 60%,#0a0f1e);min-height:100vh;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Shop data — geladen via straling-shop-data.js ──────────────────────────
const SHOP          = STRALING_SHOP;
const CAT_LABELS    = STRALING_CAT_LABELS;
const DEFAULT_AVATAR= STRALING_DEFAULT_AVATAR;
const DEFAULT_OWNED = STRALING_DEFAULT_OWNED;
const SAVE_KEY      = STRALING_SAVE_KEY;
const resolveAvatar = stralingResolveAvatar;
const renderAvatarHTML = stralingRenderAvatarHTML;
function AvatarDisplay({avatar,size=64}){
  return <span dangerouslySetInnerHTML={{__html:renderAvatarHTML(avatar,size)}} style={{display:"contents"}}/>;
}

// ── Helpers ────────────────────────────────────────────────────────────────
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];

// ── Nuclide-notatie SVG ────────────────────────────────────────────────────
// Toont een interactief atoomkernmodel: klik op een kern om A, Z, N te zien
const NUCLIDES = [
  {sym:"H",  naam:"Waterstof",  Z:1,  A:1,  N:0,  kleur:"#6366f1", stabiel:true,  desc:"De eenvoudigste kern: alleen een proton, geen neutronen."},
  {sym:"H",  naam:"Deuterium",  Z:1,  A:2,  N:1,  kleur:"#8b5cf6", stabiel:true,  desc:"Zwaar waterstof: 1 proton + 1 neutron. Stabiel isotoop."},
  {sym:"H",  naam:"Tritium",    Z:1,  A:3,  N:2,  kleur:"#a855f7", stabiel:false, desc:"Radioactief waterstof-3. Vervalt via β-verval."},
  {sym:"C",  naam:"Koolstof-12",Z:6,  A:12, N:6,  kleur:"#22c55e", stabiel:true,  desc:"Stabiel koolstof. Meest voorkomende koolstofisotoop (98,9%)."},
  {sym:"C",  naam:"Koolstof-14",Z:6,  A:14, N:8,  kleur:"#ef4444", stabiel:false, desc:"Radioactief — vervalt via β-verval. Halveringstijd: 5730 jaar."},
  {sym:"U",  naam:"Uranium-238",Z:92, A:238,N:146, kleur:"#f97316", stabiel:false, desc:"Het meest voorkomende uranium-isotoop. Vervalt via α-verval."},
];

function NuclideSVG({onSelect, selected}){
  const W=340, H=120, pad=14;
  const segW=(W-2*pad)/NUCLIDES.length;
  return(
    <div style={{margin:"12px 0"}}>
      <div style={{fontSize:10,color:"#64748b",textAlign:"center",marginBottom:4,letterSpacing:1}}>KLIK OP EEN ISOTOOP OM DE KERNSAMENSTELLING TE ZIEN</div>
      <div style={{overflowX:"auto"}}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",minWidth:280}}>
        {NUCLIDES.map((n,i)=>{
          const x=pad+i*segW+segW/2;
          const isSel=selected===i;
          return(
            <g key={i} onClick={()=>onSelect(isSel?null:i)} style={{cursor:"pointer"}}>
              {/* Kern cirkel */}
              <circle cx={x} cy={52} r={22}
                fill={n.kleur+(isSel?"55":"22")}
                stroke={n.kleur}
                strokeWidth={isSel?2.5:1.2}
                opacity={selected!==null&&!isSel?0.4:1}
                style={{transition:"all .2s"}}/>
              {/* Notatie: A linksboven, Z linksonder */}
              <text x={x-8} y={42} fill={n.kleur} fontSize="8" textAnchor="middle" fontWeight="700">{n.A}</text>
              <text x={x-8} y={58} fill={n.kleur} fontSize="8" textAnchor="middle">{n.Z}</text>
              <text x={x+2}  y={52} fill="#f1f5f9" fontSize="11" textAnchor="middle" fontWeight="800">{n.sym}</text>
              {/* Stabiel / instabiel badge */}
              <text x={x} y={84} fill={n.stabiel?"#34d399":"#ef4444"} fontSize="7" textAnchor="middle" fontWeight="600">
                {n.stabiel?"stabiel":"radioactief"}
              </text>
              {/* naam */}
              <text x={x} y={H-4} fill="#64748b" fontSize="7" textAnchor="middle">{n.naam}</text>
            </g>
          );
        })}
      </svg>
      </div>
      {selected!==null&&(()=>{
        const n=NUCLIDES[selected];
        return(
          <div style={{background:n.kleur+"22",border:`1.5px solid ${n.kleur}55`,borderRadius:12,padding:"12px 14px",marginTop:8,animation:"popIn .25s ease"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:8}}>
              {/* Grote nuclidenotatie */}
              <div style={{flexShrink:0,background:"rgba(0,0,0,.3)",borderRadius:10,padding:"10px 12px",border:`1px solid ${n.kleur}40`,minWidth:64,textAlign:"center"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"center",fontFamily:"'Courier New',monospace"}}>
                  <div style={{display:"flex",flexDirection:"column",fontSize:11,color:n.kleur,lineHeight:1.2,marginRight:2}}>
                    <span style={{fontWeight:700}}>{n.A}</span>
                    <span>{n.Z}</span>
                  </div>
                  <span style={{fontSize:22,fontWeight:800,color:"#f1f5f9",lineHeight:1}}>{n.sym}</span>
                </div>
                <div style={{fontSize:9,color:"#64748b",marginTop:4}}>{n.naam}</div>
              </div>
              <div style={{flex:1}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
                  <div style={{background:"rgba(251,191,36,.1)",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:800,color:"#fbbf24"}}>{n.A}</div>
                    <div style={{fontSize:9,color:"#64748b"}}>A = massagetal</div>
                  </div>
                  <div style={{background:"rgba(96,165,250,.1)",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:800,color:"#60a5fa"}}>{n.Z}</div>
                    <div style={{fontSize:9,color:"#64748b"}}>Z = protonen</div>
                  </div>
                  <div style={{background:"rgba(148,163,184,.1)",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:800,color:"#94a3b8"}}>{n.N}</div>
                    <div style={{fontSize:9,color:"#64748b"}}>N = neutronen</div>
                  </div>
                </div>
                <div style={{fontSize:12,color:"#cbd5e1"}}>{n.desc}</div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── Vervalvergelijking interactief SVG ────────────────────────────────────
const DECAY_EXAMPLES = {
  alpha: {
    moeder:{sym:"U", A:238, Z:92, naam:"Uranium-238", kleur:"#f97316"},
    dochter:{sym:"Th", A:234, Z:90, naam:"Thorium-234", kleur:"#22c55e"},
    deeltje:{sym:"He", A:4, Z:2, naam:"α-deeltje (heliumkern)", kleur:"#ef4444"},
    gamma:true,
    type:"α-verval",
    regel:"A: 238 = 234 + 4  |  Z: 92 = 90 + 2",
    uitleg:"Bij α-verval daalt Z met 2 en A met 4. Er komt een heliumkern (α-deeltje) vrij.",
  },
  beta: {
    moeder:{sym:"C", A:14, Z:6, naam:"Koolstof-14", kleur:"#a855f7"},
    dochter:{sym:"N", A:14, Z:7, naam:"Stikstof-14", kleur:"#22c55e"},
    deeltje:{sym:"e", A:0, Z:-1, naam:"β-deeltje (elektron)", kleur:"#06b6d4"},
    gamma:false,
    type:"β-verval",
    regel:"A: 14 = 14 + 0  |  Z: 6 = 7 + (−1)",
    uitleg:"Bij β-verval verandert een neutron in een proton + elektron. Z stijgt met 1, A blijft gelijk.",
  },
};

function DecaySVG({type}){
  if(!type) return(
    <div style={{textAlign:"center",padding:20,color:"#475569",fontSize:12}}>Selecteer een vervaltype hieronder om de vergelijking te zien.</div>
  );
  const d=DECAY_EXAMPLES[type];
  const W=320,H=80;
  function NuclideBox({n,x,y}){
    return(
      <g>
        <rect x={x-24} y={y-22} width={48} height={44} rx={6}
          fill={n.kleur+"22"} stroke={n.kleur} strokeWidth={1.5}/>
        <text x={x-10} y={y-10} fill={n.kleur} fontSize="7" textAnchor="middle" fontWeight="700">{n.A}</text>
        <text x={x-10} y={y+2}  fill={n.kleur} fontSize="7" textAnchor="middle">{n.Z}</text>
        <text x={x+4}  y={y-2}  fill="#f1f5f9" fontSize="13" textAnchor="middle" fontWeight="800">{n.sym}</text>
        <text x={x}    y={y+18} fill="#64748b"  fontSize="7"  textAnchor="middle">{n.naam}</text>
      </g>
    );
  }
  return(
    <div style={{background:"rgba(0,0,0,.25)",borderRadius:12,padding:"10px 8px",border:"1px solid rgba(255,255,255,.07)",margin:"12px 0"}}>
      <div style={{fontSize:10,color:"#64748b",textAlign:"center",marginBottom:6,letterSpacing:1}}>{d.type.toUpperCase()} — VERVALVERGELIJKING</div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
        <NuclideBox n={d.moeder}  x={45}  y={38}/>
        <text x={90} y={42} fill="#94a3b8" fontSize="14" textAnchor="middle" fontWeight="700">→</text>
        <NuclideBox n={d.dochter} x={155} y={38}/>
        <text x={200} y={42} fill="#94a3b8" fontSize="12" textAnchor="middle">+</text>
        <NuclideBox n={d.deeltje} x={250} y={38}/>
        {d.gamma&&<>
          <text x={290} y={42} fill="#94a3b8" fontSize="12" textAnchor="middle">+</text>
          <text x={313} y={42} fill="#fbbf24" fontSize="11" textAnchor="middle" fontWeight="700">γ</text>
        </>}
      </svg>
      <div style={{fontSize:11,color:"#fbbf24",textAlign:"center",marginBottom:4,fontFamily:"'Courier New',monospace"}}>{d.regel}</div>
      <div style={{fontSize:12,color:"#cbd5e1",textAlign:"center"}}>{d.uitleg}</div>
    </div>
  );
}

// ── Vragen ─────────────────────────────────────────────────────────────────

// LEVEL 1 — Atoomstructuur en isotopen (begripskennis)
const L1_QUESTIONS=[
  {type:"nuclide_quiz",
   question:"Wat geeft het atoomnummer Z aan bij een atoomkern?",
   options:["Het aantal neutronen in de kern","Het totaal aantal kerndeeltjes","Het aantal protonen in de kern","De atoommassa in gram"],
   answer:2,
   explanation:"Z = atoomnummer = aantal protonen. Het aantal protonen bepaalt het element. Twee atomen met hetzelfde Z zijn altijd hetzelfde element, ook als ze een ander aantal neutronen hebben."},
  {type:"nuclide_quiz",
   question:"Koolstof-12 heeft de notatie ⁶¹²C. Hoeveel neutronen zitten er in de kern?",
   options:["6","12","18","2"],
   answer:0,
   explanation:"N = A − Z = 12 − 6 = 6. Het massagetal A = 12 is het totaal aantal kerndeeltjes (protonen + neutronen). Er zijn dus 6 neutronen."},
  {type:"nuclide_quiz",
   question:"Wat zijn isotopen van een element?",
   options:["Atomen met hetzelfde A maar verschillende Z","Atomen met hetzelfde Z maar verschillende A","Atomen die altijd radioactief zijn","Atomen die alleen in kerncentrales voorkomen"],
   answer:1,
   explanation:"Isotopen hebben dezelfde Z (hetzelfde element), maar een ander massagetal A — dus een ander aantal neutronen. Chemisch zijn ze gelijk, in massa verschilt."},
  {type:"nuclide_quiz",
   question:"Uranium-238 heeft Z = 92 en A = 238. Hoeveel neutronen heeft deze kern?",
   options:["92","238","146","330"],
   answer:2,
   explanation:"N = A − Z = 238 − 92 = 146. De kern van uranium-238 bestaat uit 92 protonen en 146 neutronen."},
  {type:"nuclide_quiz",
   question:"Waterstof heeft drie isotopen: H-1, H-2 (deuterium) en H-3 (tritium). Wat hebben ze gemeenschappelijk?",
   options:["Hetzelfde massagetal A","Hetzelfde aantal neutronen N","Hetzelfde atoomnummer Z = 1","Dezelfde atoommassa"],
   answer:2,
   explanation:"Alle isotopen van waterstof hebben Z = 1 (één proton). Dat maakt ze waterstof. Ze verschillen in het aantal neutronen: H-1 heeft 0, H-2 heeft 1, H-3 heeft 2 neutronen."},
  {type:"text",
   question:"Van welk atoomnummer af zijn er geen stabiele isotopen meer bekend?",
   options:["Z > 50","Z > 83","Z > 92","Z > 100"],
   answer:1,
   explanation:"Alle kernen met Z > 83 zijn instabiel en dus radioactief. Bismut (Z = 83) is het zwaarste element met stabiele isotopen. Alle zwaardere elementen vervallen uiteindelijk."},
];

// LEVEL 2 — Radioactief verval: α en β (begrip + toepassen)
const L2_QUESTIONS=[
  {type:"decay_quiz",
   decayType:"alpha",
   question:"Bij α-verval zendt de kern een α-deeltje uit. Wat is een α-deeltje?",
   options:["Een snel elektron","Een foton met hoge energie","Een heliumkern: 2 protonen + 2 neutronen","Een los neutron"],
   answer:2,
   explanation:"Een α-deeltje is identiek aan een heliumkern: ²₄He. Het bestaat uit 2 protonen en 2 neutronen. Zie ook Binas tabel 25A, kolom 7."},
  {type:"decay_quiz",
   decayType:"alpha",
   question:"Uranium-238 ondergaat α-verval. Met hoeveel neemt het atoomnummer Z af?",
   options:["1","2","4","8"],
   answer:1,
   explanation:"Bij α-verval verliest de kern een α-deeltje (Z = 2, A = 4). Het atoomnummer Z neemt daarom met 2 af: van U (Z=92) naar Th (Z=90)."},
  {type:"decay_quiz",
   decayType:"beta",
   question:"Bij β-verval komt er een elektron uit de kern. Hoe kan dat, als er geen elektronen in de kern zitten?",
   options:["Het elektron wordt aangetrokken door protonen","Een neutron verandert in een proton + elektron; het elektron schiet weg","Een proton splitst in twee elektronen","De kern trekt een elektron uit de elektronenwolk"],
   answer:1,
   explanation:"Bij β-verval verandert een neutron in een proton en een elektron. Het proton blijft in de kern achter, het elektron wordt uitgestoten. Daardoor stijgt Z met 1 en blijft A gelijk."},
  {type:"decay_quiz",
   decayType:"beta",
   question:"Koolstof-14 vervalt via β-verval naar stikstof. Wat is het atoomnummer van het dochterelement?",
   options:["5","6","7","8"],
   answer:2,
   explanation:"Bij β-verval stijgt Z met 1. ¹⁴₆C → ¹⁴₇N + ⁰₋₁e. Koolstof heeft Z=6, stikstof heeft Z=7. Het massagetal A (= 14) blijft onveranderd."},
  {type:"text",
   question:"Polonium-211 (Z=84) vervalt via α-verval. Welk element ontstaat als dochterkern?",
   options:["Bismut (Z=83)","Lood (Z=82)","Thallium (Z=81)","Radium (Z=88)"],
   answer:1,
   explanation:"Bij α-verval: Z daalt met 2 en A daalt met 4. Z = 84 − 2 = 82 → Lood (Pb). A = 211 − 4 = 207. De dochterkern is dus ²⁰⁷₈₂Pb (lood-207)."},
  {type:"text",
   question:"Wanneer Radium-226 (Z=88) α-verval ondergaat, welk massagetal A heeft de dochterkern?",
   options:["226","224","222","230"],
   answer:2,
   explanation:"Bij α-verval daalt A met 4: 226 − 4 = 222. En Z daalt met 2: 88 − 2 = 86 (= Radon). De dochterkern is ²²²₈₆Rn."},
];

// LEVEL 3 — Vervalvergelijkingen opstellen (toepassen / analyseren)
const L3_QUESTIONS=[
  {type:"text",
   question:"Bij welke vervalvergelijking klopt de behoudswet voor lading (Z) EN massa (A)?",
   preQuestion:"Controleer bij elke optie: is de som van A links gelijk aan rechts? En de som van Z?",
   options:[
     "²³⁸₉₂U → ²³⁴₉₀Th + ⁴₂He",
     "²³⁸₉₂U → ²³²₉₀Th + ⁴₂He",
     "²³⁸₉₂U → ²³⁴₉₁Th + ⁴₂He",
     "²³⁸₉₂U → ²³⁴₉₀Th + ²₁He"
   ],
   answer:0,
   explanation:"Controleer A: 238 = 234 + 4 ✓ en Z: 92 = 90 + 2 ✓. Optie B klopt niet in A (238 ≠ 232+4=236). Optie C klopt niet in Z (92 ≠ 91+2=93). Optie D klopt niet in A of Z."},
  {type:"text",
   question:"In de vervalvergelijking ¹⁴₆C → ¹⁴₇N + ⁰?e, wat is de waarde op de plek van het vraagteken (het getal linksonder bij e)?",
   options:["0","1","−1","2"],
   answer:2,
   explanation:"De lading moet behouden blijven: Z links = Z rechts. 6 = 7 + ? → ? = −1. Het β-deeltje heeft lading −1 en wordt genoteerd als ⁰₋₁e. A blijft: 14 = 14 + 0 ✓"},
  {type:"text",
   question:"Thorium-234 (Z=90) vervalt via β-verval. Wat is het dochterelement?",
   options:["Radium (Z=88)","Protactinium (Z=91)","Uranium (Z=92)","Actinium (Z=89)"],
   answer:1,
   explanation:"Bij β-verval: Z stijgt met 1 en A blijft gelijk. ²³⁴₉₀Th → ²³⁴₉₁Pa + ⁰₋₁e. Protactinium heeft Z=91. Je kunt dit ook controleren via Binas tabel 25A."},
  {type:"text",
   question:"Een isotoop ondergaat α-verval en vormt ²¹⁰₈₂Pb als dochterkern. Wat was de moederkern?",
   options:["²¹⁴₈₄Po","²¹²₈₄Po","²¹⁰₈₄Po","²¹⁴₈₂Pb"],
   answer:0,
   explanation:"Bij α-verval: de moeder heeft A = 210 + 4 = 214 en Z = 82 + 2 = 84 (= polonium). De moederkern is ²¹⁴₈₄Po. Je kunt dit verifiëren via Binas tabel 25A."},
  {type:"text",
   question:"Wat is het γ-foton in een vervalvergelijking?",
   options:[
     "Een geladen deeltje dat Z verandert",
     "Een zwaar deeltje dat A vermindert",
     "Een elektromagnetisch foton met lading 0 en massagetal 0, verandert de samenstelling van de kern niet",
     "Een vervangen proton"
   ],
   answer:2,
   explanation:"Het γ-foton heeft A=0 en Z=0. Het verandert de kernsamenstelling niet, maar draagt energie weg. Notatie: ⁰₀γ. Daarom hebben de Z- en A-sommen aan beide kanten nog steeds gelijk."},
  {type:"text",
   question:"Radon-222 (Z=86) ondergaat α-verval. Welke dochterkern ontstaat?",
   options:["²¹⁸₈₄Po","²²⁰₈₄Po","²¹⁸₈₆Rn","²²²₈₄Po"],
   answer:0,
   explanation:"A = 222 − 4 = 218. Z = 86 − 2 = 84 (= Polonium). De dochterkern is ²¹⁸₈₄Po. Controleer: 222 = 218 + 4 ✓ en 86 = 84 + 2 ✓"},
];

// LEVEL 4 — Redeneren en analyseren (C-niveau)
const L4_QUESTIONS=[
  {type:"text",
   preQuestion:"Jollivet-Castelot experimenteerde in 1908 om zilver in goud te veranderen via chemie. Denk na: wanneer verandert een element wél van identiteit?",
   question:"Is het chemisch mogelijk om van lood goud te maken? Wat is de enige manier waarop een element van identiteit verandert?",
   options:[
     "Ja, door een sterke zuur-base-reactie het atoomnummer aanpassen",
     "Nee — chemische reacties wisselen alleen elektronen uit, niet protonen. Alleen kernreacties (radioactief verval of kunstmatige transmutatie) veranderen Z.",
     "Ja, door te verhitten tot het smeltpunt verdwijnen protonen",
     "Nee, want alle elementen zijn al eeuwig stabiel"
   ],
   answer:1,
   explanation:"Chemische reacties spelen zich af in de elektronenwolk. De kern — en dus Z — verandert nooit bij chemie. Alleen bij kernreacties (verval, transmutatie) verandert het atoomnummer en daarmee het element. Joslivet-Castelot had dus ongelijk."},
  {type:"text",
   question:"Een wetenschapper meet dat van een radioactieve stof na 3 uur nog 1/8 deel over is. Hoe lang is de halveringstijd?",
   options:["30 minuten","1 uur","45 minuten","2 uur"],
   answer:1,
   explanation:"1/8 = (1/2)³ → er zijn 3 halveringstijden verstreken in 3 uur. Dus T½ = 3 uur ÷ 3 = 1 uur. Dit principe (1/2ⁿ = rest) is de kern van activiteitsberekeningen in §5.4."},
  {type:"text",
   question:"Koolstofdatering werkt doordat ¹⁴C in levende organismen constant aangevuld wordt. Na de dood stopt de aanvulling en vervalt ¹⁴C. T½ = 5730 jaar. Een fossiel heeft nog 25% ¹⁴C over. Hoe oud is het?",
   options:["2865 jaar","5730 jaar","11460 jaar","17190 jaar"],
   answer:2,
   explanation:"25% = (1/2)² → 2 halveringstijden verstreken. 2 × 5730 = 11460 jaar. Dit is een toepassing van β-verval van ¹⁴C → ¹⁴N, die in de archeologie gebruikt wordt."},
  {type:"text",
   question:"Van alle kernen met Z > 83 zijn geen stabiele isotopen bekend. Welke uitspraak volgt hieruit logisch?",
   options:[
     "Alle elementen zwaarder dan Z=83 zijn kunstmatig gemaakt",
     "Alle elementen zwaarder dan bismut (Z=83) zijn radioactief en zullen uiteindelijk vervallen",
     "Uranium kan nooit in de natuur voorkomen",
     "Alle radioactieve kernen hebben Z > 83"
   ],
   answer:1,
   explanation:"Als er geen stabiele isotopen zijn, zijn alle kernen van die elementen radioactief. Uranium (Z=92) komt wél in de natuur voor, maar is radioactief. Ook kernen met Z ≤ 83 kunnen radioactief zijn (bijv. ¹⁴C), maar die hebben ook stabiele isotopen."},
  {type:"text",
   question:"Na één halveringstijd is de helft van een radioactieve stof vervallen. Na twee halveringstijden is dan…",
   options:[
     "Alles vervallen",
     "Nog 0% over",
     "Nog 25% van de oorspronkelijke hoeveelheid over",
     "Nog 50% over"
   ],
   answer:2,

// ── Zelfcheck ──────────────────────────────────────────────────────────────
const SELFCHECK=[
  {stelling:"Bij α-verval daalt het atoomnummer Z met 2.", juist:true},
  {stelling:"Bij β-verval verandert het massagetal A.",    juist:false},
  {stelling:"Isotopen hebben hetzelfde Z maar een ander A.", juist:true},
];
function SelfCheck({onDone}){
  const [antw,setAntw]=useState([null,null,null]);
  const [checked,setChecked]=useState(false);
  const score=antw.filter((a,i)=>a===SELFCHECK[i].juist).length;
  return(
    <div style={{background:"rgba(251,191,36,.06)",border:"1px solid rgba(251,191,36,.2)",borderRadius:14,padding:16,marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:14,color:"#fbbf24",marginBottom:12}}>🧠 Zelfcheck — snap je dit al?</div>
      {SELFCHECK.map((s,i)=>(
        <div key={i} style={{marginBottom:10}}>
          <div style={{fontSize:13,color:"#e2e8f0",marginBottom:6}}>{i+1}. {s.stelling}</div>
          <div style={{display:"flex",gap:8}}>
            {["Juist","Onjuist"].map(opt=>{
              const val=opt==="Juist";
              const isChosen=antw[i]===val;
              const isCorrect=checked&&val===s.juist;
              const isWrong=checked&&isChosen&&!isCorrect;
              return(
                <button key={opt} onClick={()=>{if(!checked){const n=[...antw];n[i]=val;setAntw(n);}}}
                  style={{padding:"6px 16px",borderRadius:8,border:`1.5px solid ${isCorrect?"#34d399":isWrong?"#ef4444":isChosen?"#fbbf24":"rgba(255,255,255,.15)"}`,
                    background:isCorrect?"rgba(52,211,153,.15)":isWrong?"rgba(239,68,68,.15)":isChosen?"rgba(251,191,36,.15)":"rgba(255,255,255,.04)",
                    color:isCorrect?"#34d399":isWrong?"#ef4444":isChosen?"#fbbf24":"#94a3b8",
                    cursor:checked?"default":"pointer",fontSize:13,fontWeight:600}}>
                  {opt}
                </button>
              );
            })}
          </div>
        </div>
      ))}
      {!checked?(
        <button onClick={()=>setChecked(true)} disabled={antw.includes(null)}
          style={{marginTop:8,padding:"8px 20px",background:antw.includes(null)?"rgba(255,255,255,.05)":"rgba(251,191,36,.2)",border:`1px solid ${antw.includes(null)?"rgba(255,255,255,.1)":"#fbbf24"}`,borderRadius:8,color:antw.includes(null)?"#475569":"#fbbf24",fontWeight:700,cursor:antw.includes(null)?"default":"pointer",fontSize:13}}>
          Controleer
        </button>
      ):(
        <div style={{marginTop:10}}>
          <div style={{color:score===3?"#34d399":score>=2?"#fbbf24":"#f87171",fontWeight:700,fontSize:14}}>
            {score===3?"✅ Alles goed!":score===2?"⚠️ Bijna — check de uitleg hierboven":"❌ Herhaal level 1 en 2 nog eens"}
          </div>
          <button onClick={onDone} style={{marginTop:8,padding:"7px 16px",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:8,color:"#e2e8f0",cursor:"pointer",fontSize:13}}>
            Verder →
          </button>
        </div>
      )}
    </div>
  );
}

function QuestionCard({q,sel,done,onSelect,shake,lvl}){
  const [nuclideSel,setNuclideSel]=useState(null);
  const [decayType,setDecayType]=useState(null);
  const kleur=lvl.kleur;

  return(
    <div style={{background:"rgba(255,255,255,.04)",borderRadius:16,padding:16,border:`1px solid ${kleur}30`,marginBottom:12,animation:shake?"shake .6s ease":"none"}}>
      {q.preQuestion&&!done&&(
        <div style={{background:"rgba(251,191,36,.07)",border:"1px solid rgba(251,191,36,.2)",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
          <div style={{fontSize:11,color:"#fbbf24",fontWeight:700,marginBottom:4}}>💭 DENKPAUZE</div>
          <div style={{fontSize:13,color:"#cbd5e1"}}>{q.preQuestion}</div>
        </div>
      )}
      <div style={{fontSize:14,fontWeight:600,lineHeight:1.6,marginBottom:12}}>{q.question}</div>

      {q.type==="nuclide_quiz"&&(
        <NuclideSVG selected={nuclideSel} onSelect={setNuclideSel}/>
      )}

      {q.type==="decay_quiz"&&(
        <>
          <DecaySVG type={done?q.decayType:decayType}/>
          {!done&&(
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
              {Object.entries(DECAY_EXAMPLES).map(([k,v])=>(
                <button key={k} onClick={()=>setDecayType(decayType===k?null:k)}
                  style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${decayType===k?v.moeder.kleur:"rgba(255,255,255,.15)"}`,background:decayType===k?v.moeder.kleur+"22":"rgba(255,255,255,.04)",color:decayType===k?v.moeder.kleur:"#94a3b8",fontSize:12,cursor:"pointer"}}>
                  {k==="alpha"?"α-verval":"β-verval"}
                </button>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function App(){
  const [screen,setScreen]  = useState("home");
  const [lvlIdx,setLvlIdx]  = useState(0);
  const [qIdx,setQIdx]       = useState(0);
  const [sel,setSel]         = useState(null);
  const [done,setDone]       = useState(false);
  const [scores,setScores]   = useState([0,0,0,0]);
  const [pts,setPts]         = useState(0);
  const [streak,setStreak]   = useState(0);
  const [maxStr,setMaxStr]   = useState(0);
  const [stars,setStars]     = useState([0,0,0,0]);
  const [shake,setShake]     = useState(false);
  const [showSelfCheck,setShowSelfCheck] = useState(false);
  const [selfCheckDone,setSelfCheckDone] = useState(false);
  const [shuffledQuestions,setShuffledQuestions] = useState([]);
  const [avatar,setAvatar]   = useState(DEFAULT_AVATAR);
  const [owned,setOwned]     = useState(DEFAULT_OWNED);
  const [shopCat,setShopCat] = useState("body");
  const [buyFlash,setBuyFlash]= useState(null);

  useEffect(()=>{
    const raw0=LEVELS[0].questions;
    setShuffledQuestions(raw0.map(q=>{
      if(!q.options||q.answer===undefined) return q;
      const correct=q.options[q.answer];
      const s=[...q.options];
      for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}
      return {...q,options:s,answer:s.indexOf(correct)};
    }));
  },[]);

  useEffect(()=>{
    try{
      const raw=localStorage.getItem(SAVE_KEY);
      if(raw){
        const d=JSON.parse(raw);
        if(d.avatar) setAvatar({...DEFAULT_AVATAR,...d.avatar});
        if(d.owned)  setOwned(d.owned);
        if(d.pts!==undefined) setPts(d.pts);
        if(d.stars_52) setStars(d.stars_52);
      }
    }catch(e){}
  },[]);

  const persist=(av,ow,p,st)=>{
    try{
      const prev=JSON.parse(localStorage.getItem(SAVE_KEY))||{};
      localStorage.setItem(SAVE_KEY,JSON.stringify({...prev,avatar:av,owned:ow,pts:p,...(st?{stars_52:st}:{})}));
    }catch(e){}
  };

  const addPts=n=>setPts(p=>{const np=p+n;persist(avatar,owned,np);return np;});

  const buyItem=item=>{
    if(owned.includes(item.id)||pts<item.price) return;
    const no=[...owned,item.id],np=pts-item.price;
    setOwned(no);setPts(np);setBuyFlash(item.id);setTimeout(()=>setBuyFlash(null),1200);persist(avatar,no,np);
  };
  const equipItem=(cat,item)=>{
    if(!owned.includes(item.id)) return;
    const na={...avatar,[cat]:item.id};setAvatar(na);persist(na,owned,pts);
  };

  const lvl=LEVELS[lvlIdx];
  const qs=shuffledQuestions.length>0?shuffledQuestions:lvl?.questions;
  const q=qs?.[qIdx];
  const total=qs?.length;
  const correct=done&&sel===q?.answer;
  const goHome=()=>{setScreen("home");setSel(null);setDone(false);setShowSelfCheck(false);};

  const handleConfirm=()=>{
    if(sel===null) return;
    setDone(true);
    if(sel===q.answer){
      const ns=streak+1;setStreak(ns);setMaxStr(s=>Math.max(s,ns));
      addPts(10+(ns>2?5:0));
      setScores(s=>{const n=[...s];n[lvlIdx]++;return n;});
    } else {setStreak(0);setShake(true);setTimeout(()=>setShake(false),600);}
  };

  const handleNext=()=>{
    setSel(null);setDone(false);
    if(qIdx+1<total){
      setQIdx(i=>i+1);
    } else {
      const pct=scores[lvlIdx]/total;
      const ns=pct>=.85?3:pct>=.6?2:pct>=.33?1:0;
      setStars(s=>{const n=[...s];n[lvlIdx]=ns;persist(avatar,owned,pts,n);return n;});
      if(lvlIdx===1&&!selfCheckDone){
        setShowSelfCheck(true);
      } else {
        setScreen("result");
      }
    }
  };

  const shuffleOptions=(qs)=>qs.map(q=>{
    if(!q.options||q.answer===undefined) return q;
    const correct=q.options[q.answer];
    const shuffled=[...q.options];
    for(let i=shuffled.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
    }
    return {...q,options:shuffled,answer:shuffled.indexOf(correct)};
  });

  const startLevel=i=>{
    setLvlIdx(i);setQIdx(0);setSel(null);setDone(false);setShowSelfCheck(false);
    setScores(s=>{const n=[...s];n[i]=0;return n;});
    setShuffledQuestions(shuffleOptions(LEVELS[i].questions));
    setScreen("question");
  };

  const totalStars=stars.reduce((a,b)=>a+b,0),maxStars=stars.length*3;

  return(
    <div style={{minHeight:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",color:"#f1f5f9",paddingBottom:40}}>
      <style>{`
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

        button{font-family:inherit}

        .main{flex:1;min-width:0;padding:24px 40px;max-width:820px}
        .lgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        @media(max-width:700px){.sidebar{display:none!important}.main{padding:16px 14px}}
        @media(max-width:480px){.lgrid{grid-template-columns:1fr}}
      `}</style>

      {/* HEADER */}
      <div style={{background:"rgba(255,255,255,.03)",borderBottom:"1px solid rgba(255,255,255,.07)",padding:"9px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:10,backdropFilter:"blur(8px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⚛️</span>
          <div><div style={{fontWeight:800,fontSize:14}}>Atomen en verval</div><div style={{fontSize:10,color:"#64748b"}}>4 HAVO · §5.2 · Noordhoff</div></div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12}}>
          <a href="index.html" style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:12,textDecoration:"none"}}>☢️ H5</a>
          {screen!=="home"&&<button onClick={goHome} style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:12}}>← Levels</button>}
          <div style={{textAlign:"center"}}>

                </div>
              </div>

              <div style={{background:`${lvl.kleur}15`,border:`1px solid ${lvl.kleur}30`,borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#94a3b8"}}>
                <span style={{color:lvl.kleur,fontWeight:700}}>Leerdoel:</span> {
                  lvlIdx===0?"A, Z en N lezen en berekenen bij isotopen":
                  lvlIdx===1?"α- en β-verval herkennen en effect op A en Z uitleggen":
                  lvlIdx===2?"Vervalvergelijkingen opstellen en controleren":
                  "Redeneren over kernverval, transmutatie en halveringstijd"
                }
              </div>

              <QuestionCard q={q} sel={sel} done={done} onSelect={setSel} shake={shake} lvl={lvl}/>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                {q.options.map((opt,i)=>{
                  let bg="rgba(255,255,255,.04)",border="rgba(255,255,255,.1)",col="#e2e8f0";
                  if(sel===i&&!done){bg="rgba(251,191,36,.12)";border="#fbbf24";}
                  if(done){
                    if(i===q.answer){bg="rgba(52,211,153,.12)";border="#34d399";col="#34d399";}
                    else if(i===sel&&i!==q.answer){bg="rgba(239,68,68,.12)";border="#ef4444";col="#ef4444";}
                  }
                  return(
                    <button key={i} className={!done?"ob":""} onClick={()=>{if(!done)setSel(i);}}
                      style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:"14px 16px",color:col,fontSize:13,fontWeight:500,cursor:done?"default":"pointer",textAlign:"left",display:"flex",alignItems:"flex-start",gap:10,width:"100%",minHeight:60}}>
                      <span style={{minWidth:24,height:24,borderRadius:7,background:"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,marginTop:1}}>
                        {done?(i===q.answer?"✓":i===sel?"✗":String.fromCharCode(65+i)):String.fromCharCode(65+i)}
                      </span>{opt}
                    </button>
                  );
                })}
              </div>

              {done&&(
                <div style={{background:correct?"rgba(52,211,153,.08)":"rgba(239,68,68,.08)",border:`1px solid ${correct?"#34d399":"#ef4444"}40`,borderRadius:12,padding:14,marginBottom:12,animation:"popIn .3s ease"}}>
                  <div style={{fontSize:13,fontWeight:700,color:correct?"#34d399":"#f87171",marginBottom:4}}>
                    {correct?"✅ Goed gedaan!":"❌ Niet helemaal..."}
                    {correct&&streak>2&&<span style={{marginLeft:8,color:"#fbbf24"}}>🔥 {streak}x streak! +5</span>}
                  </div>
                  <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.65}}>💡 {q.explanation}</div>
                </div>
              )}

              {!done?(
                <button onClick={handleConfirm} disabled={sel===null}
                  style={{width:"100%",padding:14,background:sel!==null?`linear-gradient(135deg,${lvl.kleur},${LEVELS[(lvlIdx+1)%4].kleur})`:"rgba(255,255,255,.05)",border:"none",borderRadius:12,color:sel!==null?"#0a0f1e":"#475569",fontWeight:700,fontSize:15,cursor:sel!==null?"pointer":"default"}}>
                  Controleer →
                </button>
              ):(
                <button onClick={handleNext}
                  style={{width:"100%",padding:14,background:`linear-gradient(135deg,${lvl.kleur},${LEVELS[(lvlIdx+1)%4].kleur})`,border:"none",borderRadius:12,color:"#0a0f1e",fontWeight:700,fontSize:15,cursor:"pointer"}}>
                  {qIdx+1<total?"Volgende vraag →":lvlIdx===1&&!selfCheckDone?"Zelfcheck →":"Resultaat bekijken 🏆"}
                </button>
              )}
            </div>
          )}

          {/* RESULTAAT */}
          {screen==="result"&&(
            <div style={{animation:"fadeIn .4s ease",textAlign:"center"}}>
              <div style={{fontSize:68,marginBottom:10,lineHeight:1}}>{stars[lvlIdx]===3?"🏆":stars[lvlIdx]>=2?"🎉":stars[lvlIdx]===1?"💪":"😤"}</div>
              <h2 style={{fontSize:24,fontWeight:800,margin:"0 0 6px"}}>{lvl.title} — Klaar!</h2>
              <div style={{fontSize:14,color:"#94a3b8",marginBottom:18}}>{scores[lvlIdx]} van {total} goed beantwoord</div>
              <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:18}}>
                {[1,2,3].map(s=><span key={s} style={{fontSize:50,opacity:stars[lvlIdx]>=s?1:.2,animation:stars[lvlIdx]>=s?`popIn .4s ease ${s*.15}s both`:"none"}}>⭐</span>)}
              </div>
              <div style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:14,marginBottom:12,border:"1px solid rgba(255,255,255,.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:13,color:"#94a3b8"}}>Score</span>
                  <span style={{fontSize:13,fontWeight:700,color:lvl.kleur}}>{Math.round((scores[lvlIdx]/total)*100)}%</span>
                </div>
                <div style={{height:7,background:"rgba(255,255,255,.06)",borderRadius:999}}>
                  <div style={{height:"100%",borderRadius:999,background:`linear-gradient(90deg,${lvl.kleur},${LEVELS[(lvlIdx+1)%4].kleur})`,width:`${(scores[lvlIdx]/total)*100}%`,transition:"width 1s"}}/>
                </div>
              </div>
              <div style={{background:"rgba(251,191,36,.06)",borderRadius:12,padding:10,marginBottom:12,border:"1px solid rgba(251,191,36,.15)"}}>
                <div style={{fontSize:13,color:"#fbbf24"}}>🔥 Langste streak: {maxStr}x &nbsp;|&nbsp; 🎯 Totaal: {pts} punten</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <button onClick={()=>startLevel(lvlIdx)} style={{padding:13,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,color:"#e2e8f0",fontWeight:600,cursor:"pointer",fontSize:14}}>🔄 Opnieuw</button>
                <button onClick={goHome} style={{padding:13,background:`linear-gradient(135deg,${lvl.kleur},${LEVELS[(lvlIdx+1)%4].kleur})`,border:"none",borderRadius:12,color:"#0a0f1e",fontWeight:700,cursor:"pointer",fontSize:14}}>🏠 Levels</button>
              </div>
              {lvlIdx<LEVELS.length-1&&(
                <button onClick={()=>startLevel(lvlIdx+1)} style={{width:"100%",padding:13,background:LEVELS[lvlIdx+1].bg,border:`1px solid ${LEVELS[lvlIdx+1].kleur}40`,borderRadius:12,color:"#f1f5f9",fontWeight:600,cursor:"pointer",fontSize:14}}>
                  Volgend level: {LEVELS[lvlIdx+1].icon} {LEVELS[lvlIdx+1].title} →
                </button>
              )}
            </div>
          )}

          {/* THEORIE */}
          {screen==="theorie"&&(
            <div style={{animation:"fadeIn .4s ease"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
                <button onClick={goHome} style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:12}}>← Terug</button>
                <h2 style={{fontSize:20,fontWeight:800,margin:0}}>📖 Theorie — §5.2 Atomen en verval</h2>
              </div>

              {/* Blok 1: Atoomstructuur */}
              <div style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.25)",borderRadius:14,padding:16,marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:15,color:"#818cf8",marginBottom:10}}>⚛️ Bouw van het atoom</div>
                <p style={{fontSize:13,color:"#cbd5e1",lineHeight:1.7,marginBottom:12}}>
                  Atomen bestaan uit een <strong style={{color:"#f1f5f9"}}>kern</strong> (protonen + neutronen) met daaromheen een <strong style={{color:"#f1f5f9"}}>elektronenwolk</strong>. Het aantal protonen Z bepaalt welk element het is.
                </p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                  {[
                    {sym:"A",naam:"Massagetal",kleur:"#fbbf24",def:"Totaal aantal kerndeeltjes: A = N + Z"},
                    {sym:"Z",naam:"Atoomnummer",kleur:"#60a5fa",def:"Aantal protonen — bepaalt het element"},
                    {sym:"N",naam:"Neutronengetal",kleur:"#94a3b8",def:"Aantal neutronen: N = A − Z"},
                  ].map((d,i)=>(
                    <div key={i} style={{background:d.kleur+"15",border:`1px solid ${d.kleur}40`,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                      <div style={{fontSize:26,fontWeight:900,color:d.kleur,marginBottom:4,fontFamily:"serif"}}>{d.sym}</div>
                      <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>{d.naam}</div>
                      <div style={{fontSize:10,color:"#94a3b8",lineHeight:1.4}}>{d.def}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"rgba(96,165,250,.08)",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#93c5fd",border:"1px solid rgba(96,165,250,.2)"}}>
                  📌 <strong>Isotopen</strong> = kernen van hetzelfde element (zelfde Z) met een ander aantal neutronen (ander A). Voorbeeld: ¹²C en ¹⁴C zijn beide koolstof (Z=6), maar hebben 6 respectievelijk 8 neutronen.
                </div>
              </div>

              {/* Blok 2: Radioactiviteit */}
              <div style={{background:"rgba(249,115,22,.08)",border:"1px solid rgba(249,115,22,.25)",borderRadius:14,padding:16,marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:15,color:"#fb923c",marginBottom:10}}>💥 Radioactief verval</div>
                <p style={{fontSize:13,color:"#cbd5e1",lineHeight:1.7,marginBottom:10}}>
                  Instabiele kernen zijn <strong style={{color:"#f1f5f9"}}>radioactief</strong>: ze veranderen spontaan in een ander element onder uitzending van straling. Dit heet <strong style={{color:"#f1f5f9"}}>radioactief verval</strong>. De oorspronkelijke kern = <em>moederkern</em>, de nieuwe kern = <em>dochterkern</em>.
                </p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[
                    {type:"α-verval",kleur:"#f97316",verandering:"Z − 2, A − 4",deeltje:"⁴₂He (heliumkern)",voorbeeld:"²³⁸₉₂U → ²³⁴₉₀Th + ⁴₂He"},
                    {type:"β-verval",kleur:"#a855f7",verandering:"Z + 1, A ongewijzigd",deeltje:"⁰₋₁e (elektron)",voorbeeld:"¹⁴₆C → ¹⁴₇N + ⁰₋₁e"},
                  ].map((d,i)=>(
                    <div key={i} style={{background:d.kleur+"15",border:`1px solid ${d.kleur}40`,borderRadius:10,padding:12}}>
                      <div style={{fontSize:14,fontWeight:800,color:d.kleur,marginBottom:6}}>{d.type}</div>
                      <div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Uitgestoten deeltje:</div>
                      <div style={{fontSize:12,color:"#e2e8f0",marginBottom:6,fontFamily:"'Courier New',monospace"}}>{d.deeltje}</div>
                      <div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Effect op kern:</div>
                      <div style={{fontSize:12,color:d.kleur,fontWeight:700,marginBottom:6}}>{d.verandering}</div>
                      <div style={{fontSize:10,color:"#64748b",fontFamily:"'Courier New',monospace",borderTop:"1px solid rgba(255,255,255,.06)",paddingTop:6}}>{d.voorbeeld}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:10,background:"rgba(251,191,36,.08)",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#fcd34d",border:"1px solid rgba(251,191,36,.2)"}}>
                  ⚡ Bij beide vervaltypen kan ook een γ-foton vrijkomen (⁰₀γ). Omdat A=0 en Z=0, verandert het de kernsamenstelling niet.
                </div>
              </div>

              {/* Blok 3: Vervalvergelijkingen */}
              <div style={{background:"rgba(34,197,94,.08)",border:"1px solid rgba(34,197,94,.25)",borderRadius:14,padding:16,marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:15,color:"#4ade80",marginBottom:10}}>🧮 Vervalvergelijkingen opstellen</div>
                <p style={{fontSize:13,color:"#cbd5e1",lineHeight:1.7,marginBottom:10}}>
                  Een vervalvergelijking beschrijft de kernreactie. Er gelden twee behoudswetten:
                </p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                  <div style={{background:"rgba(251,191,36,.08)",borderRadius:8,padding:"10px 12px",border:"1px solid rgba(251,191,36,.2)"}}>
                    <div style={{fontWeight:700,color:"#fbbf24",marginBottom:4,fontSize:12}}>🔢 Behoud van massa (A)</div>
                    <div style={{fontSize:12,color:"#e2e8f0"}}>Som van A links = som van A rechts</div>
                  </div>
                  <div style={{background:"rgba(96,165,250,.08)",borderRadius:8,padding:"10px 12px",border:"1px solid rgba(96,165,250,.2)"}}>
                    <div style={{fontWeight:700,color:"#60a5fa",marginBottom:4,fontSize:12}}>⚡ Behoud van lading (Z)</div>
                    <div style={{fontSize:12,color:"#e2e8f0"}}>Som van Z links = som van Z rechts</div>
                  </div>
                </div>
                <div style={{background:"rgba(0,0,0,.25)",borderRadius:10,padding:12,fontFamily:"'Courier New',monospace",fontSize:13,color:"#e2e8f0",marginBottom:8}}>
                  <div style={{color:"#94a3b8",fontSize:10,marginBottom:6}}>VOORBEELD — α-verval:</div>
                  <div>²³⁸₉₂U → ²³⁴₉₀Th + ⁴₂He + ⁰₀γ</div>
                  <div style={{color:"#64748b",fontSize:11,marginTop:4}}>A: 238 = 234 + 4 ✓  |  Z: 92 = 90 + 2 ✓</div>
                </div>
                <div style={{background:"rgba(0,0,0,.25)",borderRadius:10,padding:12,fontFamily:"'Courier New',monospace",fontSize:13,color:"#e2e8f0"}}>
                  <div style={{color:"#94a3b8",fontSize:10,marginBottom:6}}>VOORBEELD — β-verval:</div>
                  <div>¹⁴₆C → ¹⁴₇N + ⁰₋₁e</div>
                  <div style={{color:"#64748b",fontSize:11,marginTop:4}}>A: 14 = 14 + 0 ✓  |  Z: 6 = 7 + (−1) ✓</div>
                </div>
              </div>

              {/* Blok 4: Notatieafspraken */}
              <div style={{background:"rgba(168,85,247,.08)",border:"1px solid rgba(168,85,247,.25)",borderRadius:14,padding:16,marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:15,color:"#c084fc",marginBottom:10}}>📝 Notatieafspraken kerndeeltjes</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[
                    {notatie:"¹₁H of ¹₁p",naam:"Waterstofkern / proton",kleur:"#60a5fa"},
                    {notatie:"⁴₂He of α",naam:"Heliumkern / α-deeltje",kleur:"#f97316"},
                    {notatie:"⁰₋₁e of β",naam:"Elektron / β-deeltje",kleur:"#a855f7"},
                    {notatie:"⁰₀γ of γ",naam:"Gammafoton",kleur:"#fbbf24"},
                    {notatie:"¹₀n",naam:"Neutron",kleur:"#94a3b8"},
                  ].map((d,i)=>(
                    <div key={i} style={{background:d.kleur+"12",borderRadius:8,padding:"8px 10px",border:`1px solid ${d.kleur}30`,display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontFamily:"'Courier New',monospace",fontSize:14,color:d.kleur,fontWeight:700,flexShrink:0}}>{d.notatie}</span>
                      <span style={{fontSize:11,color:"#cbd5e1"}}>{d.naam}</span>
                    </div>
                  ))}
                </div>
              </div>

              <button onClick={goHome} style={{width:"100%",padding:13,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,color:"#e2e8f0",fontWeight:600,cursor:"pointer",fontSize:14}}>
                ← Terug naar levels
              </button>
            </div>
          )}

          {/* WINKEL */}
          {screen==="shop"&&(
            <div style={{animation:"fadeIn .35s ease"}}>
              <div style={{textAlign:"center",marginBottom:18}}>
                <div style={{display:"flex",justifyContent:"center",marginBottom:8}}><AvatarDisplay avatar={avatar} size={88}/></div>
                <div style={{fontSize:17,fontWeight:800}}>Jouw Avatar</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>💰 {pts} punten beschikbaar</div>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
                {Object.entries(CAT_LABELS).map(([cat,label])=>(
                  <button key={cat} onClick={()=>setShopCat(cat)}
                    style={{flexShrink:0,padding:"6px 12px",borderRadius:20,border:`1.5px solid ${shopCat===cat?"#60a5fa":"rgba(255,255,255,.1)"}`,background:shopCat===cat?"rgba(96,165,250,.15)":"rgba(255,255,255,.04)",color:shopCat===cat?"#60a5fa":"#94a3b8",fontWeight:600,fontSize:12,cursor:"pointer"}}>
                    {label}
                  </button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}}>
                {SHOP[shopCat].map(item=>{
                  const isOwned=owned.includes(item.id),isEq=avatar[shopCat]===item.id,canAff=pts>=item.price,jB=buyFlash===item.id;
                  return(
                    <div key={item.id} onClick={()=>isOwned?equipItem(shopCat,item):buyItem(item)} className="ch"
                      style={{background:isEq?"rgba(96,165,250,.15)":jB?"rgba(52,211,153,.15)":"rgba(255,255,255,.04)",
                        border:`1.5px solid ${isEq?"#60a5fa":jB?"#34d399":isOwned?"rgba(255,255,255,.18)":"rgba(255,255,255,.08)"}`,
                        borderRadius:12,padding:"12px 10px",cursor:(!isOwned&&!canAff)?"not-allowed":"pointer",
                        opacity:(!isOwned&&!canAff)?.45:1,textAlign:"center",position:"relative"}}>
                      {shopCat==="appbg"
                        ?<div style={{width:80,height:26,borderRadius:6,background:item.css||item.color||"#111",margin:"0 auto 6px",border:"1px solid rgba(255,255,255,.15)"}}/>
                        :shopCat==="bg"
                          ?<div style={{width:36,height:36,borderRadius:"50%",background:item.color,margin:"0 auto 6px",border:"2px solid rgba(255,255,255,.15)"}}/>
                          :<div style={{fontSize:30,marginBottom:5,lineHeight:1}}>{item.emoji||" "}</div>
                      }
                      <div style={{fontWeight:600,fontSize:12,color:"#f1f5f9"}}>{item.name}</div>
                      <div style={{marginTop:4,fontSize:11}}>
                        {isEq?<span style={{color:"#60a5fa",fontWeight:700}}>✓ Aan</span>
                        :isOwned?<span style={{color:"#34d399"}}>In bezit</span>
                        :jB?<span style={{color:"#34d399",fontWeight:700}}>✓ Gekocht!</span>
                        :<span style={{color:canAff?"#fbbf24":"#ef4444",fontWeight:600}}>💰 {item.price} pts</span>}
                      </div>
                      {isEq&&<div style={{position:"absolute",top:7,right:7,width:9,height:9,borderRadius:"50%",background:"#60a5fa"}}/>}
                    </div>
                  );
                })}
              </div>
              <button onClick={goHome} style={{width:"100%",padding:12,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,color:"#e2e8f0",fontWeight:600,cursor:"pointer",fontSize:13}}>
                ← Terug naar levels
              </button>
            </div>
          )}

        </div>{/* end main */}
      </div>{/* end layout */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
